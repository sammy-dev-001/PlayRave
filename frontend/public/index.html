    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Righteous&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <title>PlayRave - Neon Party Games</title>
    
    <style>
        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0a0a1a;
            overflow: hidden;
        }
        
        /* Loading indicator */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0a0a1a;
            color: #00ffff;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #loading h1 {
            font-size: 42px;
            margin: 0;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            animation: glow 1.5s ease-in-out infinite;
        }
        
        #loading p {
            margin-top: 20px;
            color: #c6ff4a;
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PlayRave",
      "url": "https://play-rave.vercel.app/",
      "description": "The ultimate neon-themed party game platform featuring 20+ games including Truth or Dare, Never Have I Ever, Scrabble, Tic-Tac-Toe vs AI, and more. Play online or locally with friends.",
      "applicationCategory": "GameApplication",
      "genre": "Party Game",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GBP"
      },
      "image": "https://play-rave.vercel.app/icon-512.png"
    }
    </script>
</head>
<body>
    <div id="root">
        <div id="loading">
            <h1>PLAYRAVE</h1>
            <p>NEON PARTY</p>
        </div>
    </div>
    
    <!-- Install handled by React (InstallAppModal) -->
    
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('PlayRave SW registered:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('PlayRave SW registration failed:', error);
                    });
            });
        }
        
        // Install app logic is handled inside React via beforeinstallprompt listener
        
        // Hide loading when app starts
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading && document.getElementById('root').children.length > 1) {
                    loading.style.display = 'none';
                }
            }, 2000);
        });
    </script>
</body>
</html>
